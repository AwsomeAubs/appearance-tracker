<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Appearance Booking Tracker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      padding: 40px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    h1 {
      font-size: 32px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #1d1d1f;
    }

    .subtitle {
      font-size: 14px;
      color: #86868b;
      margin-bottom: 32px;
    }

    .section {
      margin-bottom: 48px;
    }

    .section-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #1d1d1f;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .ambassador-container {
      margin-bottom: 32px;
      padding: 12px;
      background: #ffffff;
      border: 1px solid #e5e5e7;
      border-radius: 12px;
      max-width: 1000px;
    }

    .ambassador-name {
      font-size: 16px;
      font-weight: 700;
      color: #1d1d1f;
      margin-bottom: 12px;
    }

    .tab-buttons {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      border-bottom: 1px solid #e5e5e7;
      padding-bottom: 8px;
    }

    .tab-btn {
      padding: 6px 12px;
      background: transparent;
      border: none;
      color: #86868b;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      border-bottom: 2px solid transparent;
      margin-bottom: -10px;
    }

    .tab-btn.active {
      color: #0071e3;
      border-bottom-color: #0071e3;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .blocks-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }

    .block {
      background: #f9f9fb;
      border: 2px solid #e5e5e7;
      border-radius: 10px;
      padding: 10px;
    }

    .block.used {
      border-color: #34c759;
      background: #f0fdf4;
    }

    .block.available {
      border-color: #ff9500;
      background: #fffbf0;
    }

    .block-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.1);
    }

    .block-title {
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .block-title.used {
      color: #34c759;
    }

    .block-title.available {
      color: #ff9500;
    }

    .block-count {
      font-size: 24px;
      font-weight: 700;
    }

    .block-count.used {
      color: #34c759;
    }

    .block-count.available {
      color: #ff9500;
    }

    .slot-card {
      background: #ffffff;
      border: 1px solid #e5e5e7;
      border-radius: 8px;
      padding: 8px;
      margin-bottom: 4px;
    }

    .slot-card.pending {
      border-left: 4px solid #ff9500;
    }

    .slot-card.booked {
      border-left: 4px solid #0071e3;
    }

    .slot-card.used {
      border-left: 4px solid #34c759;
    }

    .slot-grid {
      display: grid;
      grid-template-columns: 0.8fr 0.8fr 0.8fr 60px auto;
      gap: 5px;
      align-items: end;
    }

    .appearance-field {
      display: flex;
      flex-direction: column;
    }

    .appearance-field-label {
      font-size: 8px;
      font-weight: 600;
      color: #86868b;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      margin-bottom: 2px;
    }

    .slot-status {
      display: flex;
      flex-direction: column;
    }

    .status-select {
      padding: 8px 12px;
      border: 1px solid #e5e5e7;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      background: #ffffff;
      color: #1d1d1f;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .status-select:focus {
      outline: none;
      border-color: #0071e3;
      box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.1);
    }

    .status-select.pending {
      border-color: #ff9500;
      background: #fffbf0;
    }

    .status-select.booked {
      border-color: #0071e3;
      background: #f0f4ff;
    }

    .status-select.used {
      border-color: #34c759;
      background: #f0fdf4;
    }

    input, select, textarea {
      padding: 5px 8px;
      border: 1px solid #e5e5e7;
      border-radius: 6px;
      font-size: 10px;
      font-family: inherit;
      background: #ffffff;
      color: #1d1d1f;
      transition: all 0.2s ease;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #0071e3;
      box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.1);
    }

    button {
      padding: 6px 10px;
      border: 1px solid #e5e5e7;
      background: #ffffff;
      color: #1d1d1f;
      border-radius: 6px;
      cursor: pointer;
      font-size: 10px;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    button:hover {
      background: #f5f5f7;
      border-color: #d2d2d7;
    }

    .delete-btn {
      padding: 6px 10px;
      background: #ffffff;
      border: 1px solid #ff3b30;
      color: #ff3b30;
    }

    .delete-btn:hover {
      background: #ffebee;
    }

    .add-btn {
      background: #0071e3;
      color: #ffffff;
      border-color: #0071e3;
      width: 100%;
      padding: 8px;
      margin-top: 6px;
    }

    .add-btn:hover {
      background: #0077ed;
    }

    .empty-state {
      text-align: center;
      padding: 16px;
      color: #86868b;
      font-size: 12px;
    }

    .notes-section {
      background: #f9f9fb;
      border: 1px solid #e5e5e7;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .notes-field {
      margin-bottom: 16px;
    }

    .notes-field:last-child {
      margin-bottom: 0;
    }

    .notes-label {
      font-size: 12px;
      font-weight: 700;
      color: #1d1d1f;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .notes-textarea {
      width: 100%;
      min-height: 80px;
      padding: 12px;
      border: 1px solid #e5e5e7;
      border-radius: 6px;
      font-size: 12px;
      font-family: inherit;
      color: #1d1d1f;
      resize: vertical;
    }

    .notes-textarea:focus {
      outline: none;
      border-color: #0071e3;
      box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.1);
    }

    .roster-container {
      background: #ffffff;
      border: 1px solid #e5e5e7;
      border-radius: 12px;
      overflow: hidden;
    }

    .roster-player {
      border-bottom: 1px solid #e5e5e7;
      padding: 16px;
    }

    .roster-player:last-child {
      border-bottom: none;
    }

    .player-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      padding: 0;
    }

    .player-info {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
    }

    .player-avatar {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: #34c759;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 12px;
      flex-shrink: 0;
    }

    .player-name {
      font-size: 14px;
      font-weight: 600;
      color: #1d1d1f;
    }

    .usage-badge {
      font-size: 14px;
      font-weight: 700;
      color: #34c759;
    }

    .toggle-icon {
      font-size: 14px;
      transition: transform 0.2s ease;
      color: #86868b;
    }

    .toggle-icon.open {
      transform: rotate(180deg);
    }

    .player-details-section {
      display: none;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #e5e5e7;
    }

    .player-details-section.open {
      display: block;
    }

    .add-player-section {
      margin-top: 16px;
      padding: 16px;
      background: #f9f9fb;
      border: 1px dashed #e5e5e7;
      border-radius: 8px;
    }

    .add-player-form {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 8px;
      align-items: end;
    }

    .summary-dashboard {
      background: #1d1d1f;
      border-radius: 12px;
      padding: 32px;
      margin-bottom: 48px;
      color: #f5f5f7;
    }

    .summary-title {
      font-size: 20px;
      font-weight: 700;
      color: #f5f5f7;
      margin-bottom: 28px;
      text-align: center;
      letter-spacing: 0.5px;
    }

    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 24px;
    }

    .chart-card {
      background: #2a2a2c;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
    }

    .chart-name {
      font-size: 14px;
      font-weight: 600;
      color: #a1a1a6;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 16px;
    }

    .chart-container {
      position: relative;
      height: 160px;
      margin-bottom: 12px;
    }

    .chart-stat {
      font-size: 18px;
      font-weight: 700;
      color: #0071e3;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📅 Appearance Booking Tracker</h1>
    <p class="subtitle">Manage player appearances, locations, and activations</p>

    <!-- SUMMARY DASHBOARD -->
    <div class="summary-dashboard">
      <div class="summary-title">📊 Performance Overview</div>
      <div class="charts-grid">
        <div class="chart-card">
          <div class="chart-name">John Smit</div>
          <div class="chart-container">
            <canvas id="chart-john"></canvas>
          </div>
          <div class="chart-stat" id="stat-john">—</div>
        </div>
        <div class="chart-card">
          <div class="chart-name">Kekeletso Mphuthi</div>
          <div class="chart-container">
            <canvas id="chart-keke"></canvas>
          </div>
          <div class="chart-stat" id="stat-keke">—</div>
        </div>
        <div class="chart-card">
          <div class="chart-name">Teboho Mokoena</div>
          <div class="chart-container">
            <canvas id="chart-teboho"></canvas>
          </div>
          <div class="chart-stat" id="stat-teboho">—</div>
        </div>
        <div class="chart-card">
          <div class="chart-name">Springbok Roster</div>
          <div class="chart-container">
            <canvas id="chart-springbok"></canvas>
          </div>
          <div class="chart-stat" id="stat-springbok">—</div>
        </div>
      </div>
    </div>

    <!-- AMBASSADORS SECTION -->
    <div class="section">
      <div class="section-title">Key Ambassadors</div>
      <div id="ambassadorsContainer"></div>
    </div>

    <!-- SPRINGBOK ROSTER SECTION -->
    <div class="section">
      <div class="section-title">Springbok Roster</div>
      <div class="roster-container" id="rosterContainer"></div>
    </div>
  </div>

  <script>
    const DEFAULT_DATA = {
      ambassadors: [
        {
          id: 1,
          firstName: "John",
          lastName: "Smit",
          usedAppearances: [
            { date: "11 Jul 2026", location: "Loftus Versfeld", purpose: "Lead the Boks" },
            { date: "04 Jul 2026", location: "Tableview", purpose: "Dealership Launch" },
            { date: "18 Jul 2026", location: "East London", purpose: "Dealership Opening" },
            { date: "15 Aug 2026", location: "Hyundai HQ", purpose: "Host a Bok" },
            { date: "25 Aug 2026", location: "Head Office", purpose: "Business Breakfast" },
            { date: "01 Jun 2026", location: "Midrand", purpose: "Campaign Launch" },
            { date: "10 Jun 2026", location: "JHB", purpose: "Digital Content" },
            { date: "20 Jun 2026", location: "Cape Town", purpose: "Rugby Event" }
          ],
          availableSlots: [
            { id: 1, status: 'pending', date: '', location: '', purpose: '' },
            { id: 2, status: 'pending', date: '', location: '', purpose: '' },
            { id: 3, status: 'pending', date: '', location: '', purpose: '' },
            { id: 4, status: 'pending', date: '', location: '', purpose: '' },
            { id: 5, status: 'pending', date: '', location: '', purpose: '' },
            { id: 6, status: 'pending', date: '', location: '', purpose: '' },
            { id: 7, status: 'pending', date: '', location: '', purpose: '' },
            { id: 8, status: 'pending', date: '', location: '', purpose: '' },
            { id: 9, status: 'pending', date: '', location: '', purpose: '' },
            { id: 10, status: 'pending', date: '', location: '', purpose: '' }
          ],
          specialRequirements: "",
          carPreferences: "",
          learnings: ""
        },
        {
          id: 2,
          firstName: "Kekeletso",
          lastName: "Mphuthi",
          usedAppearances: [
            { date: "01 Jun 2026", location: "Midrand", purpose: "Campaign Launch" },
            { date: "15 Aug 2026", location: "Digital", purpose: "Awareness Campaign" }
          ],
          availableSlots: [
            { id: 1, status: 'pending', date: '', location: '', purpose: '' },
            { id: 2, status: 'pending', date: '', location: '', purpose: '' },
            { id: 3, status: 'pending', date: '', location: '', purpose: '' },
            { id: 4, status: 'pending', date: '', location: '', purpose: '' },
            { id: 5, status: 'pending', date: '', location: '', purpose: '' },
            { id: 6, status: 'pending', date: '', location: '', purpose: '' }
          ],
          specialRequirements: "",
          carPreferences: "",
          learnings: ""
        },
        {
          id: 3,
          firstName: "Teboho",
          lastName: "Mokoena",
          usedAppearances: [
            { date: "10 Aug 2026", location: "Hyundai HQ", purpose: "Brand Activation" }
          ],
          availableSlots: [
            { id: 1, status: 'pending', date: '', location: '', purpose: '' },
            { id: 2, status: 'pending', date: '', location: '', purpose: '' },
            { id: 3, status: 'pending', date: '', location: '', purpose: '' },
            { id: 4, status: 'pending', date: '', location: '', purpose: '' },
            { id: 5, status: 'pending', date: '', location: '', purpose: '' },
            { id: 6, status: 'pending', date: '', location: '', purpose: '' },
            { id: 7, status: 'pending', date: '', location: '', purpose: '' }
          ],
          specialRequirements: "",
          carPreferences: "",
          learnings: ""
        }
      ],
      roster: [
        {
          id: 1,
          firstName: "Bongi",
          lastName: "Mbonambi",
          appearances: [
            { date: "23 May 2026", location: "Midrand Dealership", purpose: "Content Generation" },
            { date: "15 Jun 2026", location: "Cape Town", purpose: "Brand Activation" }
          ],
          specialRequirements: "",
          carPreferences: "",
          learnings: ""
        },
        {
          id: 2,
          firstName: "Willie",
          lastName: "Le Roux",
          appearances: [
            { date: "04 Jul 2026", location: "Tableview Dealership", purpose: "Dealership Opening" },
            { date: "18 Jul 2026", location: "East London Dealership", purpose: "Dealership Opening" }
          ],
          specialRequirements: "",
          carPreferences: "",
          learnings: ""
        },
        {
          id: 3,
          firstName: "Steven",
          lastName: "Kitshoff",
          appearances: [
            { date: "12 Jul 2026", location: "Sandton", purpose: "Rugby Activation" }
          ],
          specialRequirements: "",
          carPreferences: "",
          learnings: ""
        }
      ]
    };

    // JSONbin Configuration
    const JSONBIN_BIN_ID = '6a5aaff4f5f4af5e299ea178';
    const JSONBIN_API_KEY = '$2a$10$d0ZKKCuLHzhMtWxIkuxeDeAD9vUvWJ10TZA16dxR/l9e4TbiiPYNi';
    const JSONBIN_URL = `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`;

    let data = {};

    // Load data from JSONbin
    async function loadData() {
      try {
        const response = await fetch(JSONBIN_URL, {
          method: 'GET',
          headers: {
            'X-Master-Key': JSONBIN_API_KEY
          }
        });
        
        if (response.ok) {
          const result = await response.json();
          data = result.record;
          console.log('Data loaded from JSONbin');
        } else {
          throw new Error('JSONbin load failed');
        }
      } catch (error) {
        console.log('JSONbin error, using defaults:', error);
        data = DEFAULT_DATA;
      }
      renderUI();
      renderCharts();
    }

    // Save data to JSONbin
    async function saveData() {
      try {
        const response = await fetch(JSONBIN_URL, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'X-Master-Key': JSONBIN_API_KEY
          },
          body: JSON.stringify(data)
        });

        if (response.ok) {
          console.log('Data saved to JSONbin');
          // Also save to localStorage as backup
          localStorage.setItem('bookingTrackerData', JSON.stringify(data));
          renderUI();
          renderCharts();
        } else {
          console.error('JSONbin save failed');
          // Fallback to localStorage if JSONbin fails
          localStorage.setItem('bookingTrackerData', JSON.stringify(data));
        }
      } catch (error) {
        console.log('JSONbin save error, using localStorage:', error);
        localStorage.setItem('bookingTrackerData', JSON.stringify(data));
      }
    }

    function renderUI() {
      renderAmbassadors();
      renderRoster();
    }

    function renderAmbassadors() {
      const container = document.getElementById('ambassadorsContainer');
      
      container.innerHTML = data.ambassadors.map((amb, idx) => {
        const used = amb.usedAppearances.length;
        const pending = amb.availableSlots.filter(s => s.status === 'pending').length;
        const booked = amb.availableSlots.filter(s => s.status === 'booked').length;
        const completed = amb.availableSlots.filter(s => s.status === 'used').length;
        
        return `
          <div class="ambassador-container">
            <div class="ambassador-name">${amb.firstName} ${amb.lastName}</div>
            
            <div class="tab-buttons">
              <button class="tab-btn active" onclick="switchAmbTab(${idx}, 'appearances')">Appearances</button>
              <button class="tab-btn" onclick="switchAmbTab(${idx}, 'info')">Special Info</button>
            </div>

            <!-- APPEARANCES TAB -->
            <div class="tab-content active" id="tab-appearances-${idx}">
              <div class="blocks-grid">
                <!-- USED BLOCK -->
                <div class="block used">
                  <div class="block-header" onclick="toggleAmbUsedBlock(${idx})" style="cursor: pointer;">
                    <div style="display: flex; gap: 8px; align-items: center;">
                      <div class="block-title used">Used Appearances</div>
                      <span class="toggle-icon" id="toggle-used-${idx}">▼</span>
                    </div>
                    <div class="block-count used">${used}</div>
                  </div>

                  <div id="used-content-${idx}" style="display: none;">
                    ${used === 0 ? 
                      '<div class="empty-state">No appearances logged yet</div>' : 
                      amb.usedAppearances.map((app, appIdx) => `
                        <div class="slot-card used">
                          <div class="slot-grid">
                            <div class="appearance-field">
                              <div class="appearance-field-label">Date</div>
                              <input type="date" value="${convertDateToInput(app.date)}" 
                                onchange="updateAmbUsedAppearance(${idx}, ${appIdx}, 'date', this.value)">
                            </div>
                            <div class="appearance-field">
                              <div class="appearance-field-label">Location</div>
                              <input type="text" value="${app.location}" 
                                onchange="updateAmbUsedAppearance(${idx}, ${appIdx}, 'location', this.value)">
                            </div>
                            <div class="appearance-field">
                              <div class="appearance-field-label">Purpose</div>
                              <input type="text" value="${app.purpose}" 
                                onchange="updateAmbUsedAppearance(${idx}, ${appIdx}, 'purpose', this.value)">
                            </div>
                            <div></div>
                            <button class="delete-btn" onclick="deleteAmbUsedAppearance(${idx}, ${appIdx})">Delete</button>
                          </div>
                        </div>
                      `).join('')
                    }
                    <button class="add-btn" onclick="addAmbUsedAppearance(${idx})">+ Add Used Appearance</button>
                  </div>
                </div>

                <!-- AVAILABLE SLOTS BLOCK -->
                <div class="block available">
                  <div class="block-header" onclick="toggleAmbAvailableBlock(${idx})" style="cursor: pointer;">
                    <div style="display: flex; gap: 8px; align-items: center;">
                      <div class="block-title available">Available Slots</div>
                      <span class="toggle-icon" id="toggle-available-${idx}">▼</span>
                    </div>
                    <div class="block-count available">${pending + booked + completed}</div>
                  </div>

                  <div id="available-content-${idx}" style="display: none;">
                    ${amb.availableSlots.length === 0 ? 
                      '<div class="empty-state">No slots. Add more below.</div>' : 
                      amb.availableSlots.map((slot, slotIdx) => `
                        <div class="slot-card ${slot.status}">
                          <div class="slot-grid">
                            <div class="appearance-field">
                              <div class="appearance-field-label">Date</div>
                              <input type="date" value="${convertDateToInput(slot.date)}" 
                                onchange="updateAmbSlot(${idx}, ${slotIdx}, 'date', this.value)">
                            </div>
                            <div class="appearance-field">
                              <div class="appearance-field-label">Location</div>
                              <input type="text" value="${slot.location}" placeholder="${slot.status === 'pending' ? 'TBD' : ''}"
                                onchange="updateAmbSlot(${idx}, ${slotIdx}, 'location', this.value)">
                            </div>
                            <div class="appearance-field">
                              <div class="appearance-field-label">Purpose</div>
                              <input type="text" value="${slot.purpose}" placeholder="${slot.status === 'pending' ? 'TBD' : ''}"
                                onchange="updateAmbSlot(${idx}, ${slotIdx}, 'purpose', this.value)">
                            </div>
                            <div class="slot-status">
                              <div class="appearance-field-label">Status</div>
                              <select class="status-select ${slot.status}" onchange="updateAmbSlotStatus(${idx}, ${slotIdx}, this.value)">
                                <option value="pending" ${slot.status === 'pending' ? 'selected' : ''}>Pending</option>
                                <option value="booked" ${slot.status === 'booked' ? 'selected' : ''}>Booked</option>
                                <option value="used" ${slot.status === 'used' ? 'selected' : ''}>Used</option>
                              </select>
                            </div>
                            <button class="delete-btn" onclick="deleteAmbSlot(${idx}, ${slotIdx})">Delete</button>
                          </div>
                        </div>
                      `).join('')
                    }
                    <button class="add-btn" onclick="addAmbSlot(${idx})">+ Add Slot</button>
                  </div>
                </div>
              </div>
            </div>

            <!-- SPECIAL INFO TAB -->
            <div class="tab-content" id="tab-info-${idx}">
              <div class="notes-section">
                <div class="notes-field">
                  <div class="notes-label">Special Requirements</div>
                  <textarea class="notes-textarea" placeholder="e.g., Dietary requirements, Travel preferences, Accommodation needs, etc." 
                    onchange="updateAmbInfo(${idx}, 'specialRequirements', this.value)">${amb.specialRequirements}</textarea>
                </div>

                <div class="notes-field">
                  <div class="notes-label">Car Preferences</div>
                  <textarea class="notes-textarea" placeholder="e.g., Preferred models, features they like, family size vehicle needed, etc." 
                    onchange="updateAmbInfo(${idx}, 'carPreferences', this.value)">${amb.carPreferences}</textarea>
                </div>

                <div class="notes-field">
                  <div class="notes-label">Learnings & Insights</div>
                  <textarea class="notes-textarea" placeholder="e.g., Best engagement strategies, successful event types, feedback from past appearances, future ideas, etc." 
                    onchange="updateAmbInfo(${idx}, 'learnings', this.value)">${amb.learnings}</textarea>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderRoster() {
      const container = document.getElementById('rosterContainer');
      
      if (data.roster.length === 0) {
        container.innerHTML = '<div class="empty-state">No roster players. Add one to get started.</div>';
      } else {
        container.innerHTML = data.roster.map((player, idx) => `
          <div class="roster-player">
            <div class="player-header" onclick="toggleRosterDetails(${idx})">
              <div class="player-info">
                <div class="player-avatar">${player.firstName.charAt(0)}${player.lastName.charAt(0)}</div>
                <div class="player-name">${player.firstName} ${player.lastName}</div>
              </div>
              <div style="flex: 1; margin-left: 20px; font-size: 13px; color: #86868b;">
                ${player.appearances.length > 0 ? 
                  `<span>Last: ${player.appearances[player.appearances.length - 1].date} • ${player.appearances[player.appearances.length - 1].location}</span>` : 
                  `<span style="color: #d2d2d7;">No appearances yet</span>`
                }
              </div>
              <div style="display: flex; gap: 16px; align-items: center;">
                <div class="usage-badge">${player.appearances.length}/8</div>
                <div class="toggle-icon" id="toggle-roster-${idx}">▼</div>
              </div>
            </div>

            <div class="player-details-section" id="details-roster-${idx}">
              <div class="tab-buttons">
                <button class="tab-btn active" onclick="switchRosterTab(${idx}, 'appearances')">Appearances</button>
                <button class="tab-btn" onclick="switchRosterTab(${idx}, 'info')">Special Info</button>
              </div>

              <!-- APPEARANCES TAB -->
              <div class="tab-content active" id="roster-tab-appearances-${idx}">
                <div style="margin-bottom: 16px;">
                  ${player.appearances.length === 0 ? 
                    '<div class="empty-state">No appearances logged yet</div>' : 
                    player.appearances.map((app, appIdx) => `
                      <div class="slot-card used">
                        <div class="slot-grid">
                          <div class="appearance-field">
                            <div class="appearance-field-label">Date</div>
                            <input type="date" value="${convertDateToInput(app.date)}" 
                              onchange="updateRosterAppearance(${idx}, ${appIdx}, 'date', this.value)">
                          </div>
                          <div class="appearance-field">
                            <div class="appearance-field-label">Location</div>
                            <input type="text" value="${app.location}" 
                              onchange="updateRosterAppearance(${idx}, ${appIdx}, 'location', this.value)">
                          </div>
                          <div class="appearance-field">
                            <div class="appearance-field-label">Purpose</div>
                            <input type="text" value="${app.purpose}" 
                              onchange="updateRosterAppearance(${idx}, ${appIdx}, 'purpose', this.value)">
                          </div>
                          <div></div>
                          <button class="delete-btn" onclick="deleteRosterAppearance(${idx}, ${appIdx})">Delete</button>
                        </div>
                      </div>
                    `).join('')
                  }
                </div>

                <div style="margin-bottom: 16px;">
                  <div class="appearance-field">
                    <div class="appearance-field-label" style="margin-bottom: 8px;">Add New Appearance</div>
                    <div class="slot-grid">
                      <input type="date" id="date-roster-${idx}">
                      <input type="text" id="location-roster-${idx}" placeholder="Location">
                      <input type="text" id="purpose-roster-${idx}" placeholder="Purpose">
                      <div></div>
                      <button onclick="addRosterAppearance(${idx})">Add</button>
                    </div>
                  </div>
                </div>
              </div>

              <!-- SPECIAL INFO TAB -->
              <div class="tab-content" id="roster-tab-info-${idx}">
                <div class="notes-section">
                  <div class="notes-field">
                    <div class="notes-label">Special Requirements</div>
                    <textarea class="notes-textarea" placeholder="e.g., Dietary requirements, Travel preferences, Accommodation needs, etc." 
                      onchange="updateRosterInfo(${idx}, 'specialRequirements', this.value)">${player.specialRequirements}</textarea>
                  </div>

                  <div class="notes-field">
                    <div class="notes-label">Car Preferences</div>
                    <textarea class="notes-textarea" placeholder="e.g., Preferred models, features they like, family size vehicle needed, etc." 
                      onchange="updateRosterInfo(${idx}, 'carPreferences', this.value)">${player.carPreferences}</textarea>
                  </div>

                  <div class="notes-field">
                    <div class="notes-label">Learnings & Insights</div>
                    <textarea class="notes-textarea" placeholder="e.g., Best engagement strategies, successful event types, feedback from past appearances, future ideas, etc." 
                      onchange="updateRosterInfo(${idx}, 'learnings', this.value)">${player.learnings}</textarea>
                  </div>
                </div>
              </div>

              <button class="delete-btn" onclick="deleteRosterPlayer(${idx})" style="width: 100%; margin-top: 8px;">Remove Player</button>
            </div>
          </div>
        `).join('');
      }

      // Add player form
      const addSection = document.createElement('div');
      addSection.className = 'add-player-section';
      addSection.innerHTML = `
        <div class="add-player-form">
          <input type="text" id="newFirstName" placeholder="First name">
          <input type="text" id="newLastName" placeholder="Last name">
          <button class="add-btn" style="width: auto; padding: 10px 20px;" onclick="addNewRosterPlayer()">+ Add Player</button>
        </div>
      `;
      container.appendChild(addSection);
    }

    function switchAmbTab(idx, tab) {
      document.getElementById(`tab-appearances-${idx}`).classList.remove('active');
      document.getElementById(`tab-info-${idx}`).classList.remove('active');
      Array.from(event.target.parentElement.children).forEach(b => b.classList.remove('active'));
      
      document.getElementById(`tab-${tab}-${idx}`).classList.add('active');
      event.target.classList.add('active');
    }

    function switchRosterTab(idx, tab) {
      document.getElementById(`roster-tab-appearances-${idx}`).classList.remove('active');
      document.getElementById(`roster-tab-info-${idx}`).classList.remove('active');
      Array.from(event.target.parentElement.children).forEach(b => b.classList.remove('active'));
      
      document.getElementById(`roster-tab-${tab}-${idx}`).classList.add('active');
      event.target.classList.add('active');
    }

    function toggleAmbUsedBlock(idx) {
      const content = document.getElementById(`used-content-${idx}`);
      const toggle = document.getElementById(`toggle-used-${idx}`);
      content.style.display = content.style.display === 'none' ? 'block' : 'none';
      toggle.classList.toggle('open');
    }

    function toggleAmbAvailableBlock(idx) {
      const content = document.getElementById(`available-content-${idx}`);
      const toggle = document.getElementById(`toggle-available-${idx}`);
      content.style.display = content.style.display === 'none' ? 'block' : 'none';
      toggle.classList.toggle('open');
    }

    function toggleRosterDetails(idx) {
      const details = document.getElementById(`details-roster-${idx}`);
      const toggle = document.getElementById(`toggle-roster-${idx}`);
      details.classList.toggle('open');
      toggle.classList.toggle('open');
    }

    function addAmbUsedAppearance(idx) {
      data.ambassadors[idx].usedAppearances.push({
        date: '',
        location: '',
        purpose: ''
      });
      saveData();
    }

    function updateAmbUsedAppearance(idx, appIdx, field, value) {
      if (field === 'date') {
        value = new Date(value).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
      }
      data.ambassadors[idx].usedAppearances[appIdx][field] = value;
      saveData();
    }

    function deleteAmbUsedAppearance(idx, appIdx) {
      if (confirm('Delete this appearance?')) {
        data.ambassadors[idx].usedAppearances.splice(appIdx, 1);
        saveData();
      }
    }

    function addAmbSlot(idx) {
      const newId = Math.max(...data.ambassadors[idx].availableSlots.map(s => s.id), 0) + 1;
      data.ambassadors[idx].availableSlots.push({
        id: newId,
        status: 'pending',
        date: '',
        location: '',
        purpose: ''
      });
      saveData();
    }

    function updateAmbSlot(idx, slotIdx, field, value) {
      if (field === 'date') {
        value = new Date(value).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
      }
      data.ambassadors[idx].availableSlots[slotIdx][field] = value;
      saveData();
    }

    function updateAmbSlotStatus(idx, slotIdx, status) {
      data.ambassadors[idx].availableSlots[slotIdx].status = status;
      saveData();
    }

    function deleteAmbSlot(idx, slotIdx) {
      if (confirm('Delete this slot?')) {
        data.ambassadors[idx].availableSlots.splice(slotIdx, 1);
        saveData();
      }
    }

    function updateAmbInfo(idx, field, value) {
      data.ambassadors[idx][field] = value;
      saveData();
    }

    function addRosterAppearance(idx) {
      const dateInput = document.getElementById(`date-roster-${idx}`);
      const locationInput = document.getElementById(`location-roster-${idx}`);
      const purposeInput = document.getElementById(`purpose-roster-${idx}`);

      if (!dateInput.value || !locationInput.value || !purposeInput.value) {
        alert('Please fill all fields');
        return;
      }

      data.roster[idx].appearances.push({
        date: new Date(dateInput.value).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }),
        location: locationInput.value,
        purpose: purposeInput.value
      });

      dateInput.value = '';
      locationInput.value = '';
      purposeInput.value = '';

      saveData();
    }

    function updateRosterAppearance(idx, appIdx, field, value) {
      if (field === 'date') {
        value = new Date(value).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
      }
      data.roster[idx].appearances[appIdx][field] = value;
      saveData();
    }

    function deleteRosterAppearance(idx, appIdx) {
      if (confirm('Delete this appearance?')) {
        data.roster[idx].appearances.splice(appIdx, 1);
        saveData();
      }
    }

    function updateRosterInfo(idx, field, value) {
      data.roster[idx][field] = value;
      saveData();
    }

    function deleteRosterPlayer(idx) {
      if (confirm(`Remove ${data.roster[idx].firstName} ${data.roster[idx].lastName}?`)) {
        data.roster.splice(idx, 1);
        saveData();
      }
    }

    function addNewRosterPlayer() {
      const firstName = document.getElementById('newFirstName').value;
      const lastName = document.getElementById('newLastName').value;

      if (!firstName || !lastName) {
        alert('Please enter first and last name');
        return;
      }

      data.roster.push({
        id: Date.now(),
        firstName: firstName,
        lastName: lastName,
        appearances: [],
        specialRequirements: "",
        carPreferences: "",
        learnings: ""
      });

      document.getElementById('newFirstName').value = '';
      document.getElementById('newLastName').value = '';

      saveData();
    }

    function convertDateToInput(dateStr) {
      if (!dateStr) return '';
      const date = new Date(dateStr);
      return date.toISOString().split('T')[0];
    }

    function renderCharts() {
      // John Smit
      const johnUsed = data.ambassadors[0].usedAppearances.length;
      const johnTotal = johnUsed + data.ambassadors[0].availableSlots.length;
      createPieChart('chart-john', johnUsed, johnTotal - johnUsed, johnUsed, johnTotal);
      document.getElementById('stat-john').innerHTML = `<span style="font-size: 16px; color: #34c759;">${johnUsed}</span><span style="font-size: 11px; color: #a1a1a6;"> / ${johnTotal} used</span>`;

      // Kekeletso
      const kekeUsed = data.ambassadors[1].usedAppearances.length;
      const kekeTotal = kekeUsed + data.ambassadors[1].availableSlots.length;
      createPieChart('chart-keke', kekeUsed, kekeTotal - kekeUsed, kekeUsed, kekeTotal);
      document.getElementById('stat-keke').innerHTML = `<span style="font-size: 16px; color: #34c759;">${kekeUsed}</span><span style="font-size: 11px; color: #a1a1a6;"> / ${kekeTotal} used</span>`;

      // Teboho
      const tebohoUsed = data.ambassadors[2].usedAppearances.length;
      const tebohoTotal = tebohoUsed + data.ambassadors[2].availableSlots.length;
      createPieChart('chart-teboho', tebohoUsed, tebohoTotal - tebohoUsed, tebohoUsed, tebohoTotal);
      document.getElementById('stat-teboho').innerHTML = `<span style="font-size: 16px; color: #34c759;">${tebohoUsed}</span><span style="font-size: 11px; color: #a1a1a6;"> / ${tebohoTotal} used</span>`;

      // Springbok Roster
      const springbokUsed = data.roster.reduce((sum, p) => sum + p.appearances.length, 0);
      const springbokTotal = 8;
      createPieChart('chart-springbok', springbokUsed, springbokTotal - springbokUsed, springbokUsed, springbokTotal);
      document.getElementById('stat-springbok').innerHTML = `<span style="font-size: 16px; color: #34c759;">${springbokUsed}</span><span style="font-size: 11px; color: #a1a1a6;"> / ${springbokTotal} used</span>`;
    }

    function createPieChart(canvasId, used, remaining, usedCount, totalCount) {
      const ctx = document.getElementById(canvasId).getContext('2d');
      
      if (window[canvasId + '_chart']) {
        window[canvasId + '_chart'].destroy();
      }

      window[canvasId + '_chart'] = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: ['Used', 'Remaining'],
          datasets: [{
            data: [used, remaining],
            backgroundColor: ['#34c759', '#ff9500'],
            borderColor: ['#34c759', '#ff9500'],
            borderWidth: 0
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              display: false
            }
          }
        }
      });
    }

    loadData();
  </script>
</body>
</html>
